<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem eOPR SKPK Miri</title>
    
    <!-- Memuatkan Tailwind CSS untuk rekaan -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memuatkan React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Memuatkan Babel untuk membaca sintaks JSX dalam pelayar -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Memuatkan Firebase Modul (v11) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Konfigurasi Firebase dari pengguna
        const firebaseConfig = {
            apiKey: "AIzaSyDgRIFFYuObFpWXUUjMw4HyONEiqeYrabg",
            authDomain: "eoprskpkmiri.firebaseapp.com",
            projectId: "eoprskpkmiri",
            storageBucket: "eoprskpkmiri.firebasestorage.app",
            messagingSenderId: "507515031308",
            appId: "1:507515031308:web:f742c066813227aeda0329",
            measurementId: "G-JB3FTCGDYY"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Dedahkan fungsi kepada React (melalui tingkap/window global)
        window.firebaseDB = db;
        window.firebaseAuth = auth;
        window.firebaseTools = { collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, signInAnonymously };
    </script>

    <style>
        /* Tetapan cetakan PDF ke saiz A4 dan skala automatik 85% */
        @media print {
            @page {
                size: A4;
                margin: 10mm;
            }
            body { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                zoom: 0.85; 
            }
            .print\:hidden { display: none !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:mt-0 { margin-top: 0 !important; }
            .print\:break-before-page { break-before: page; page-break-before: always; }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- Ikon SVG Dalam Talian ---
        const FileText = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>;
        const PlusCircle = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="16"/><line x1="8" x2="16" y1="12" y2="12"/></svg>;
        const List = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>;
        const Printer = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const ArrowLeft = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
        const ImageIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
        const CheckCircle = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const Pencil = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>;
        const PenTool = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>;
        const Trash2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const MessageSquare = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;

        // Senarai nama guru
        const senaraiGuru = [
          "AZIZ BIN TAHIR", "MOHAMAD ABIDIN BIN SIPEK", "LING MEE CHOO", "SALIHIN BIN AHMAD",
          "AIDA MASTURINA BINTI HAMKA", "AIFA NUR BESTARI BINTI RADUAN", "BRYAN ANAK CONSTANT",
          "CHRISTIAN SIMON", "DLIYANA ANAK JOHN", "EIFILISIA AMBER ANAK MERVIN", "FAZRI BIN BAKERI",
          "HAIROL BIN ISMAIL", "HILWA HAYATI BINTI MOHAMAD AJALAN", "JACQUELINE TIONG HOE DING",
          "JERIAH ANAK SIMON", "JIMMY ANAK PETER", "KHAIRI BIN SAHARI", "MARY JANE AMOI UMPANG ANAK DANIEL MAWAT",
          "MOHD RAFEEQ BIN SULAIMAN", "MUHAMMAD ZULHUSAINI BIN ABDUL WAHAB", "NUR HIDAYU BINTI YUSOP",
          "NURUL HUDA BTE MOHD IHWAN", "NUR AZLIN BINTI NORIZAN", "NUR FADZLIAH AMAL BINTI OSMAN",
          "SABARIAH BINTI SOLHI", "SYAEEZA LIANA BINTI RAMLI", "TENG RU YUN", "TING HUA EE",
          "TING YU YONG", "VANITHA A/P SUBRAMANIAM", "WONG PICK KING", "ZEPRINA ANAK BENIK",
          "NORMIRI BINTI ABDULLAH", "HAZUANI BINTI HIPNI", "HELLEN RANJA ANAK BELI", "NORAISYAH BINTI ASHARI",
          "KAMARIA BINTI BUJANG", "AZENI BIN MAT", "EVELYN SENA ANAK USSIK", "MARIATI BINTI JULAIHI",
          "ALEXANDER LIPA ANAK RANTIE"
        ];

        // Komponen Pad Tandatangan
        const SignaturePad = ({ onSave, onCancel, title, defaultDate }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [signDate, setSignDate] = useState(defaultDate || new Date().toISOString().split('T')[0]);

            const startDrawing = (e) => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                ctx.beginPath();
                ctx.moveTo(clientX - rect.left, clientY - rect.top);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault(); 
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                ctx.lineTo(clientX - rect.left, clientY - rect.top);
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.stroke();
            };

            const stopDrawing = () => setIsDrawing(false);

            const clear = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            };

            const save = () => {
                const canvas = canvasRef.current;
                onSave(canvas.toDataURL('image/png'), signDate);
            };

            return (
                <div className="border p-6 bg-white rounded-lg shadow-xl text-center w-full max-w-md mx-auto">
                    <h4 className="font-bold mb-4 text-gray-800 text-lg flex items-center justify-center gap-2">
                        <PenTool size={20} /> {title}
                    </h4>
                    <div className="mb-4 text-left px-2">
                        <label className="block text-sm font-semibold text-gray-700 mb-1">Tarikh Tindakan:</label>
                        <input 
                            type="date" 
                            value={signDate} 
                            onChange={(e) => setSignDate(e.target.value)} 
                            className="w-full border border-gray-300 rounded-md p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" 
                            required 
                        />
                    </div>
                    <div className="bg-gray-50 border-2 border-dashed border-gray-400 rounded-md mb-4 touch-none overflow-hidden inline-block">
                        <canvas 
                            ref={canvasRef}
                            width={350}
                            height={150}
                            className="bg-transparent cursor-crosshair touch-none"
                            onMouseDown={startDrawing}
                            onMouseMove={draw}
                            onMouseUp={stopDrawing}
                            onMouseOut={stopDrawing}
                            onTouchStart={startDrawing}
                            onTouchMove={draw}
                            onTouchEnd={stopDrawing}
                        />
                    </div>
                    <div className="flex justify-center gap-3">
                        <button onClick={clear} className="px-4 py-2 bg-gray-200 text-gray-700 font-medium rounded hover:bg-gray-300">Padam</button>
                        <button onClick={onCancel} className="px-4 py-2 bg-red-100 text-red-700 font-medium rounded hover:bg-red-200">Batal</button>
                        <button onClick={save} className="px-4 py-2 bg-green-600 text-white font-medium rounded hover:bg-green-700">Simpan T/Tangan</button>
                    </div>
                </div>
            );
        };

        function App() {
          const [activeTab, setActiveTab] = useState('list'); 
          const [reports, setReports] = useState([]);
          const [currentReport, setCurrentReport] = useState(null);
          const [firebaseReady, setFirebaseReady] = useState(false);
          const [signingRole, setSigningRole] = useState(null); 
          const [isSaving, setIsSaving] = useState(false);
          
          // State untuk maklum balas
          const [feedbackModalOpen, setFeedbackModalOpen] = useState(false);
          const [tempFeedback, setTempFeedback] = useState('');

          // Nilai lalai borang (staffTidakHadir kini berbentuk Array)
          const initialForm = {
            id: null,
            program: '',
            panitia: '',
            penyelaras: '',
            kehadiranGuru: [],
            staffTidakHadir: [], 
            kehadiranIbuBapa: false,
            kehadiranMurid: false,
            jumlahMurid: '',
            kehadiranSekolahLain: false,
            namaSekolahLain: '',
            kehadiranAgensiLuar: false,
            namaAgensiLuar: '',
            tarikh: '',
            masa: '',
            tempat: '',
            isu: '',
            objektif: '',
            interprestasi: '',
            hasil: 'Hasil aktiviti ini, ',
            disediakanOleh: '',
            jawatanDisediakan: 'Guru',
            tarikhDisediakan: '',
            signDisediakan: null, 
            disemakOleh: '',
            jawatanDisemak: 'Penolong Kanan',
            tarikhDisemak: '',
            signSemak: null, 
            disahkanOleh: senaraiGuru[0],
            jawatanDisahkan: 'Guru Besar',
            tarikhDisahkan: '',
            signSah: null,   
            maklumBalas: '', 
            gambar: [],
            timestamp: null
          };

          const [formData, setFormData] = useState(initialForm);

          // Memuatkan Firebase
          useEffect(() => {
            const checkFirebase = setInterval(async () => {
              if (window.firebaseDB && window.firebaseTools && window.firebaseAuth) {
                clearInterval(checkFirebase);
                try {
                  await window.firebaseTools.signInAnonymously(window.firebaseAuth);
                  
                  const repCol = window.firebaseTools.collection(window.firebaseDB, "eopr_reports");
                  window.firebaseTools.onSnapshot(repCol, (snapshot) => {
                    const rpts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    rpts.sort((a, b) => b.timestamp - a.timestamp);
                    setReports(rpts);
                  }, (err) => console.error("Error fetching data:", err));
                  
                  setFirebaseReady(true);
                } catch (e) {
                  console.error("Gagal initialize Firebase Auth", e);
                }
              }
            }, 100);
            return () => clearInterval(checkFirebase);
          }, []);

          useEffect(() => {
            if (currentReport) {
              const updated = reports.find(r => r.id === currentReport.id);
              if (updated) setCurrentReport(updated);
            }
          }, [reports]);

          const handleInputChange = (e) => {
            const { name, value, type, checked } = e.target;
            setFormData(prev => {
              const updated = { ...prev, [name]: type === 'checkbox' ? checked : value };
              
              if (name === 'disemakOleh') {
                const jawatanMap = {
                  "MOHAMAD ABIDIN BIN SIPEK": "Penolong Kanan Pentadbiran",
                  "LING MEE CHOO": "Penolong Kanan Hal Ehwal Murid",
                  "SALIHIN BIN AHMAD": "Penolong Kanan Kokurikulum"
                };
                if (jawatanMap[value]) {
                  updated.jawatanDisemak = jawatanMap[value];
                }
              }
              
              return updated;
            });
          };

          const handleGuruCheckbox = (guru) => {
            setFormData(prev => {
              const hadir = prev.kehadiranGuru.includes(guru);
              const newKehadiran = hadir 
                  ? prev.kehadiranGuru.filter(g => g !== guru)
                  : [...prev.kehadiranGuru, guru];
              
              // Buang dari senarai tidak hadir secara automatik jika ditanda hadir semula
              const currentTidakHadirArray = Array.isArray(prev.staffTidakHadir) ? prev.staffTidakHadir : [];
              const newTidakHadir = currentTidakHadirArray.filter(g => !newKehadiran.includes(g));

              return {
                ...prev,
                kehadiranGuru: newKehadiran,
                staffTidakHadir: newTidakHadir
              };
            });
          };

          const handleSelectAllGuru = () => {
            setFormData(prev => {
              const isAllSelected = prev.kehadiranGuru.length === senaraiGuru.length;
              return {
                ...prev,
                kehadiranGuru: isAllSelected ? [] : [...senaraiGuru],
                staffTidakHadir: isAllSelected ? (Array.isArray(prev.staffTidakHadir) ? prev.staffTidakHadir : []) : []
              };
            });
          };

          const handleTidakHadirCheckbox = (guru) => {
            setFormData(prev => {
                const currentArray = Array.isArray(prev.staffTidakHadir) ? prev.staffTidakHadir : [];
                const isSelected = currentArray.includes(guru);
                return {
                    ...prev,
                    staffTidakHadir: isSelected 
                        ? currentArray.filter(g => g !== guru)
                        : [...currentArray, guru]
                };
            });
          };

          const handleImageUpload = (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            const remainingSlots = 6 - formData.gambar.length;
            const filesToProcess = files.slice(0, remainingSlots);

            filesToProcess.forEach(file => {
              const reader = new FileReader();
              reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                  const canvas = document.createElement('canvas');
                  const MAX_WIDTH = 600;
                  let width = img.width;
                  let height = img.height;
                  
                  if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                  }
                  
                  canvas.width = width;
                  canvas.height = height;
                  const ctx = canvas.getContext('2d');
                  ctx.drawImage(img, 0, 0, width, height);
                  
                  const compressedData = canvas.toDataURL('image/jpeg', 0.6);
                  setFormData(prev => ({ ...prev, gambar: [...prev.gambar, compressedData].slice(0, 6) }));
                };
                img.src = event.target.result;
              };
              reader.readAsDataURL(file);
            });
          };

          const removeImage = (index) => {
            setFormData(prev => ({
              ...prev,
              gambar: prev.gambar.filter((_, i) => i !== index)
            }));
          };

          const handleSubmit = async (e) => {
            e.preventDefault();
            setIsSaving(true);
            try {
              if (formData.id) {
                const docRef = window.firebaseTools.doc(window.firebaseDB, "eopr_reports", formData.id);
                await window.firebaseTools.updateDoc(docRef, formData);
                setCurrentReport(formData);
              } else {
                const colRef = window.firebaseTools.collection(window.firebaseDB, "eopr_reports");
                const docData = { ...formData, timestamp: Date.now() };
                delete docData.id; 
                const docRef = await window.firebaseTools.addDoc(colRef, docData);
                setCurrentReport({ ...docData, id: docRef.id });
              }
              setFormData(initialForm);
              setActiveTab('preview'); 
            } catch (err) {
              console.error("Gagal menyimpan dokumen", err);
              alert("Gagal menyimpan ke pangkalan data. Sila pastikan gambar tidak terlalu besar.");
            } finally {
              setIsSaving(false);
            }
          };

          const handleEdit = (report) => {
            const reportToEdit = { ...report };
            // Pastikan jika fail lama guna string utk Tidak Hadir, kita tukar ke array kosong supaya tidak rosak UI checkbox
            if (typeof reportToEdit.staffTidakHadir === 'string') {
                reportToEdit.staffTidakHadir = []; 
            }
            setFormData(reportToEdit);
            setActiveTab('form');
          };

          const deleteReport = async (id) => {
            if (window.confirm("Adakah anda pasti mahu memadam laporan ini? Ia tidak boleh dikembalikan.")) {
                try {
                    const docRef = window.firebaseTools.doc(window.firebaseDB, "eopr_reports", id);
                    await window.firebaseTools.deleteDoc(docRef);
                    if (currentReport && currentReport.id === id) setActiveTab('list');
                } catch (err) {
                    console.error("Gagal memadam", err);
                }
            }
          };

          const handleSaveSignature = async (dataUrl, selectedDate) => {
             if (!currentReport || !signingRole) return;
             try {
                const docRef = window.firebaseTools.doc(window.firebaseDB, "eopr_reports", currentReport.id);
                const updateData = {};
                
                if (signingRole === 'semak') {
                    updateData.signSemak = dataUrl;
                    updateData.tarikhDisemak = selectedDate; 
                } else if (signingRole === 'sah') {
                    updateData.signSah = dataUrl;
                    updateData.tarikhDisahkan = selectedDate; 
                } else if (signingRole === 'disediakan') {
                    updateData.signDisediakan = dataUrl;
                    updateData.tarikhDisediakan = selectedDate; 
                }
                
                await window.firebaseTools.updateDoc(docRef, updateData);
                setSigningRole(null);
             } catch (err) {
                 console.error("Gagal menyimpan tandatangan", err);
                 alert("Gagal menyimpan tandatangan.");
             }
          };

          const handleSaveFeedback = async () => {
             if (!currentReport) return;
             try {
                const docRef = window.firebaseTools.doc(window.firebaseDB, "eopr_reports", currentReport.id);
                await window.firebaseTools.updateDoc(docRef, { maklumBalas: tempFeedback });
                setFeedbackModalOpen(false);
             } catch (err) {
                 console.error("Gagal menyimpan maklum balas", err);
                 alert("Gagal menyimpan maklum balas.");
             }
          };

          if (!firebaseReady) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-gray-100">
                <div className="text-center font-bold text-gray-500 animate-pulse">Menyambung ke Pangkalan Data Firebase...</div>
              </div>
            );
          }

          const renderForm = () => (
            <div className="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md mb-10">
              <h2 className="text-2xl font-bold mb-6 flex items-center gap-2 text-gray-800">
                <FileText className="text-blue-600" />
                {formData.id ? 'Kemaskini eOPR SKPK Miri' : 'Borang eOPR SKPK Miri'}
              </h2>
              
              <form onSubmit={handleSubmit} className="space-y-6">
                {/* Maklumat Asas */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="col-span-1 md:col-span-2">
                    <label className="block text-sm font-semibold text-gray-700">Program</label>
                    <input type="text" name="program" value={formData.program} onChange={handleInputChange} required className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" />
                  </div>
                  <div className="col-span-1 md:col-span-2">
                    <label className="block text-sm font-semibold text-gray-700">Unit / Panitia</label>
                    <input type="text" name="panitia" value={formData.panitia} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" />
                  </div>
                </div>

                {/* Kehadiran */}
                <div className="bg-gray-50 p-4 rounded-md border border-gray-200">
                  <h3 className="text-lg font-semibold mb-3 border-b pb-2">Kehadiran</h3>
                  
                  <div className="mb-4">
                    <label className="block text-sm font-semibold text-gray-700 mb-1">Penyelaras</label>
                    <select name="penyelaras" value={formData.penyelaras} onChange={handleInputChange} className="block w-full md:w-1/2 border border-gray-300 rounded-md shadow-sm p-2">
                      <option value="">Pilih Penyelaras...</option>
                      {senaraiGuru.map((guru, idx) => <option key={`k-${idx}`} value={guru}>{guru}</option>)}
                    </select>
                  </div>

                  <div className="mb-4">
                    <div className="flex justify-between items-center mb-2">
                      <label className="block text-sm font-semibold text-gray-700">Senarai Guru Hadir</label>
                      <button type="button" onClick={handleSelectAllGuru} className="text-xs bg-blue-100 text-blue-700 px-3 py-1.5 rounded-md hover:bg-blue-200 font-medium transition">
                        {formData.kehadiranGuru.length === senaraiGuru.length ? 'Nyahpilih Semua' : 'Pilih Semua'}
                      </button>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2 max-h-64 overflow-y-auto p-3 border border-gray-300 rounded-md bg-white shadow-sm">
                      {senaraiGuru.map((guru, idx) => (
                        <label key={`hadir-${idx}`} className="flex items-start gap-2 text-sm cursor-pointer hover:bg-gray-50 p-1.5 rounded transition">
                          <input 
                            type="checkbox" 
                            checked={formData.kehadiranGuru.includes(guru)}
                            onChange={() => handleGuruCheckbox(guru)}
                            className="mt-0.5 rounded text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer"
                          />
                          <span className="leading-tight">{guru}</span>
                        </label>
                      ))}
                    </div>
                  </div>

                  <div className="mb-4 pt-4 border-t border-gray-200">
                    <div className="flex justify-between items-center mb-2">
                        <label className="block text-sm font-semibold text-gray-700">Senarai Staf / Guru Tidak Hadir</label>
                    </div>
                    <p className="text-xs text-gray-500 mb-2">Tandakan pada nama yang ingin direkodkan sebagai Tidak Hadir ke program ini (senarai diambil daripada staf yang tidak ditanda hadir di atas).</p>
                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2 max-h-64 overflow-y-auto p-3 border border-gray-300 rounded-md bg-white shadow-sm">
                      {senaraiGuru.filter(g => !formData.kehadiranGuru.includes(g)).length > 0 ? (
                          senaraiGuru
                              .filter(g => !formData.kehadiranGuru.includes(g))
                              .map((guru, idx) => (
                                <label key={`tdk-hadir-${idx}`} className="flex items-start gap-2 text-sm cursor-pointer hover:bg-red-50 p-1.5 rounded transition">
                                  <input 
                                    type="checkbox" 
                                    checked={Array.isArray(formData.staffTidakHadir) && formData.staffTidakHadir.includes(guru)}
                                    onChange={() => handleTidakHadirCheckbox(guru)}
                                    className="mt-0.5 rounded text-red-600 focus:ring-red-500 w-4 h-4 cursor-pointer"
                                  />
                                  <span className="leading-tight text-gray-800">{guru}</span>
                                </label>
                              ))
                      ) : (
                          <div className="text-sm text-gray-500 italic col-span-full">Semua staf telah ditanda hadir.</div>
                      )}
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">Lain-lain Kehadiran</label>
                    <div className="space-y-3 p-4 bg-white border border-gray-300 rounded-md shadow-sm">
                      <label className="flex items-center gap-2 text-sm cursor-pointer">
                        <input 
                          type="checkbox" 
                          name="kehadiranIbuBapa"
                          checked={formData.kehadiranIbuBapa}
                          onChange={handleInputChange}
                          className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer"
                        />
                        <span className="font-medium text-gray-800">1. Ibu bapa dan penjaga</span>
                      </label>
                      <div className="flex flex-col sm:flex-row sm:items-center gap-3">
                        <label className="flex items-center gap-2 text-sm cursor-pointer">
                          <input 
                            type="checkbox" 
                            name="kehadiranMurid"
                            checked={formData.kehadiranMurid}
                            onChange={handleInputChange}
                            className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer"
                          />
                          <span className="font-medium text-gray-800">2. Murid-murid</span>
                        </label>
                        {formData.kehadiranMurid && (
                          <input 
                            type="text" 
                            name="jumlahMurid"
                            value={formData.jumlahMurid || ''}
                            onChange={handleInputChange}
                            placeholder="Sila nyatakan jumlah murid..." 
                            className="border border-gray-300 rounded shadow-sm p-1.5 text-sm flex-1 max-w-sm"
                            required={formData.kehadiranMurid}
                          />
                        )}
                      </div>
                      <div className="flex flex-col sm:flex-row sm:items-center gap-3">
                        <label className="flex items-center gap-2 text-sm cursor-pointer">
                          <input 
                            type="checkbox" 
                            name="kehadiranSekolahLain"
                            checked={formData.kehadiranSekolahLain}
                            onChange={handleInputChange}
                            className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer"
                          />
                          <span className="font-medium text-gray-800">3. Sekolah lain</span>
                        </label>
                        {formData.kehadiranSekolahLain && (
                          <input 
                            type="text" 
                            name="namaSekolahLain"
                            value={formData.namaSekolahLain}
                            onChange={handleInputChange}
                            placeholder="Sila nyatakan nama sekolah..." 
                            className="border border-gray-300 rounded shadow-sm p-1.5 text-sm flex-1 max-w-sm"
                            required={formData.kehadiranSekolahLain}
                          />
                        )}
                      </div>
                      <div className="flex flex-col sm:flex-row sm:items-center gap-3">
                        <label className="flex items-center gap-2 text-sm cursor-pointer">
                          <input 
                            type="checkbox" 
                            name="kehadiranAgensiLuar"
                            checked={formData.kehadiranAgensiLuar}
                            onChange={handleInputChange}
                            className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer"
                          />
                          <span className="font-medium text-gray-800">4. Agensi Luar</span>
                        </label>
                        {formData.kehadiranAgensiLuar && (
                          <input 
                            type="text" 
                            name="namaAgensiLuar"
                            value={formData.namaAgensiLuar || ''}
                            onChange={handleInputChange}
                            placeholder="Sila nyatakan nama agensi luar..." 
                            className="border border-gray-300 rounded shadow-sm p-1.5 text-sm flex-1 max-w-sm"
                            required={formData.kehadiranAgensiLuar}
                          />
                        )}
                      </div>
                    </div>
                  </div>
                </div>

                {/* Maklumat Pelaksanaan */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div>
                    <label className="block text-sm font-semibold text-gray-700">Tarikh</label>
                    <input type="date" name="tarikh" value={formData.tarikh} onChange={handleInputChange} required className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" />
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-gray-700">Masa</label>
                    <input type="text" name="masa" value={formData.masa} onChange={handleInputChange} placeholder="Cth: 8:00 Pagi - 12:00 Tghari" className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" />
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-gray-700">Tempat</label>
                    <input type="text" name="tempat" value={formData.tempat} onChange={handleInputChange} required className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" />
                  </div>
                </div>

                {/* Perincian OPR */}
                <div className="space-y-4">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-semibold text-gray-700">Fokus: Isu</label>
                      <textarea name="isu" value={formData.isu} onChange={handleInputChange} rows="3" className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2"></textarea>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700">Fokus: Objektif</label>
                      <textarea name="objektif" value={formData.objektif} onChange={handleInputChange} rows="3" className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2"></textarea>
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-gray-700">Huraian Aktiviti</label>
                    <textarea name="interprestasi" value={formData.interprestasi} onChange={handleInputChange} rows="2" className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2"></textarea>
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-gray-700">Hasil Aktiviti</label>
                    <textarea name="hasil" value={formData.hasil} onChange={handleInputChange} rows="3" className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2"></textarea>
                  </div>
                </div>

                {/* Pengesahan */}
                <div className="bg-gray-50 p-4 rounded-md border border-gray-200 grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div>
                    <h3 className="font-semibold text-gray-800 mb-2 border-b pb-1">Disediakan Oleh:</h3>
                    <div className="space-y-2">
                      <select name="disediakanOleh" value={formData.disediakanOleh} onChange={handleInputChange} required className="block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                        <option value="">Nama Pegawai...</option>
                        {senaraiGuru.map((guru, idx) => <option key={`s-${idx}`} value={guru}>{guru}</option>)}
                      </select>
                      <input type="text" name="jawatanDisediakan" value={formData.jawatanDisediakan} onChange={handleInputChange} placeholder="Jawatan" className="block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm" />
                    </div>
                  </div>
                  <div>
                    <h3 className="font-semibold text-gray-800 mb-2 border-b pb-1">Disemak Oleh:</h3>
                    <div className="space-y-2">
                      <select name="disemakOleh" value={formData.disemakOleh} onChange={handleInputChange} required className="block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm">
                        <option value="">Nama Pegawai...</option>
                        {senaraiGuru.slice(1, 4).map((guru, idx) => <option key={`sm-${idx}`} value={guru}>{guru}</option>)}
                      </select>
                      <input type="text" name="jawatanDisemak" value={formData.jawatanDisemak} onChange={handleInputChange} placeholder="Jawatan" className="block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm" />
                    </div>
                  </div>
                  <div>
                    <h3 className="font-semibold text-gray-800 mb-2 border-b pb-1">Disahkan Oleh:</h3>
                    <div className="space-y-2">
                      <select name="disahkanOleh" value={formData.disahkanOleh} onChange={handleInputChange} className="block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm bg-gray-100" readOnly>
                        <option value={senaraiGuru[0]}>{senaraiGuru[0]}</option>
                      </select>
                      <input type="text" name="jawatanDisahkan" value={formData.jawatanDisahkan} onChange={handleInputChange} placeholder="Jawatan" className="block w-full border border-gray-300 rounded-md shadow-sm p-2 text-sm" />
                    </div>
                  </div>
                </div>

                {/* Muat Naik Gambar */}
                <div>
                  <label className="block text-sm font-semibold text-gray-700">Gambar Aktiviti (Maksimum 6 gambar)</label>
                  <div className="mt-1 flex items-center gap-4">
                    <label className={`flex items-center gap-2 px-4 py-2 bg-white rounded-md shadow-sm border cursor-pointer transition ${formData.gambar.length >= 6 ? 'border-gray-300 text-gray-400 cursor-not-allowed' : 'border-blue-600 text-blue-600 hover:bg-blue-50'}`}>
                      <ImageIcon size={20} />
                      <span>Muat Naik Gambar</span>
                      <input type="file" accept="image/*" multiple className="hidden" onChange={handleImageUpload} disabled={formData.gambar.length >= 6} />
                    </label>
                    <div className="text-sm font-medium text-gray-600">
                      {formData.gambar.length} / 6 gambar dimuat naik
                    </div>
                  </div>
                  {formData.gambar.length > 0 && (
                    <div className="mt-3 grid grid-cols-2 md:grid-cols-3 gap-3">
                      {formData.gambar.map((src, idx) => (
                        <div key={idx} className="relative group aspect-[4/3] border rounded-md shadow-sm overflow-hidden">
                          <img src={src} alt={`Preview ${idx+1}`} className="w-full h-full object-cover" />
                          <button type="button" onClick={() => removeImage(idx)} className="absolute top-1 right-1 bg-red-600 text-white rounded-full w-6 h-6 flex items-center justify-center opacity-0 group-hover:opacity-100 transition shadow-md font-bold text-xs">
                            X
                          </button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <button type="submit" disabled={isSaving} className={`w-full text-white font-bold py-3 px-4 rounded-md shadow transition flex justify-center items-center gap-2 ${formData.id ? 'bg-yellow-500 hover:bg-yellow-600' : 'bg-blue-600 hover:bg-blue-700'} ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}>
                  {isSaving ? <span className="animate-spin text-xl">⏳</span> : (formData.id ? <Pencil size={20} /> : <CheckCircle size={20} />)}
                  {isSaving ? 'Menyimpan...' : (formData.id ? 'Kemaskini & Jana Laporan' : 'Simpan & Jana Laporan')}
                </button>
              </form>
            </div>
          );

          const renderList = () => (
            <div className="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md mb-10">
              <h2 className="text-2xl font-bold mb-6 flex items-center gap-2 text-gray-800">
                <List className="text-blue-600" />
                Senarai Rekod OPR Atas Talian
              </h2>
              
              {reports.length === 0 ? (
                <div className="text-center py-10 bg-gray-50 rounded-lg border border-dashed border-gray-300">
                  <FileText className="mx-auto h-12 w-12 text-gray-400 mb-3" />
                  <p className="text-gray-500">Belum ada rekod laporan OPR.</p>
                </div>
              ) : (
                <div className="overflow-x-auto">
                  <table className="min-w-full bg-white border border-gray-200">
                    <thead className="bg-gray-100">
                      <tr>
                        <th className="py-2 px-4 border-b text-left text-sm font-semibold text-gray-700 w-1/3">Tarikh & Status</th>
                        <th className="py-2 px-4 border-b text-left text-sm font-semibold text-gray-700">Program</th>
                        <th className="py-2 px-4 border-b text-left text-sm font-semibold text-gray-700">Disediakan Oleh</th>
                        <th className="py-2 px-4 border-b text-center text-sm font-semibold text-gray-700">Tindakan</th>
                      </tr>
                    </thead>
                    <tbody>
                      {reports.map((report) => (
                        <tr key={report.id} className="hover:bg-gray-50 transition">
                          <td className="py-3 px-4 border-b text-sm text-gray-800 align-top">
                             <div className="font-medium">{report.tarikh || '-'}</div>
                             <div className="flex flex-wrap gap-1 mt-1">
                                {report.signSemak && report.signSah ? (
                                    <span className="text-[10px] px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 font-bold border border-blue-300">✅ Lengkap Disemak</span>
                                ) : (
                                    <>
                                        <span className={`text-[10px] px-1.5 py-0.5 rounded ${report.signDisediakan ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-700'}`}>{report.signDisediakan ? 'Sign Pelapor' : 'Blm Dilapor'}</span>
                                        <span className={`text-[10px] px-1.5 py-0.5 rounded ${report.signSemak ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>{report.signSemak ? 'Disemak' : 'Blm Disemak'}</span>
                                        <span className={`text-[10px] px-1.5 py-0.5 rounded ${report.signSah ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{report.signSah ? 'Disahkan' : 'Blm Disahkan'}</span>
                                    </>
                                )}
                             </div>
                             {report.maklumBalas && (
                                <div className="mt-2 text-[11px] bg-yellow-50 p-1.5 rounded border border-yellow-200 text-yellow-800 leading-tight">
                                    <span className="font-bold flex items-center gap-1"><MessageSquare size={10} /> Maklum balas:</span>
                                    {report.maklumBalas}
                                </div>
                             )}
                          </td>
                          <td className="py-3 px-4 border-b text-sm text-gray-800 font-medium align-top">{report.program}</td>
                          <td className="py-3 px-4 border-b text-sm text-gray-600 align-top">{report.disediakanOleh}</td>
                          <td className="py-3 px-4 border-b text-center space-x-2 align-top">
                            <button 
                              onClick={() => {
                                setCurrentReport(report);
                                setActiveTab('preview');
                              }}
                              className="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-md text-sm font-medium hover:bg-blue-200 transition"
                            >
                              Lihat
                            </button>
                            <button 
                              onClick={() => handleEdit(report)}
                              className="bg-yellow-100 text-yellow-700 p-1.5 rounded-md text-sm font-medium hover:bg-yellow-200 transition"
                              title="Kemaskini"
                            >
                              <Pencil size={18} />
                            </button>
                            <button 
                              onClick={() => deleteReport(report.id)}
                              className="bg-red-100 text-red-700 p-1.5 rounded-md text-sm font-medium hover:bg-red-200 transition"
                              title="Padam"
                            >
                              <Trash2 size={18} />
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );

          const renderPreview = () => {
            if (!currentReport) return null;
            const r = currentReport;

            let senaraiHadir = [...(r.kehadiranGuru || [])];
            if (r.kehadiranIbuBapa) senaraiHadir.push("Ibu bapa dan penjaga");
            if (r.kehadiranMurid) senaraiHadir.push(`Murid-murid ${r.jumlahMurid ? `(${r.jumlahMurid} orang)` : ''}`);
            if (r.kehadiranSekolahLain && r.namaSekolahLain) senaraiHadir.push(`Sekolah lain (${r.namaSekolahLain})`);
            if (r.kehadiranAgensiLuar && r.namaAgensiLuar) senaraiHadir.push(`Agensi Luar (${r.namaAgensiLuar})`);
            
            const displayHadir = senaraiHadir.length > 0 
              ? senaraiHadir.map((nama, idx) => `${idx + 1}. ${nama}`).join('\n')
              : 'Tiada ahli yang hadir direkodkan.';

            // Logik paparan balik "Tidak Hadir" (Menyokong laporan lama yang berupa String atau rekod baru berbentuk Array)
            let tidakHadirDisplay = '';
            if (Array.isArray(r.staffTidakHadir)) {
                tidakHadirDisplay = r.staffTidakHadir.length > 0 
                  ? r.staffTidakHadir.map((nama, idx) => `${idx + 1}. ${nama}`).join('\n')
                  : null;
            } else if (r.staffTidakHadir && r.staffTidakHadir.trim() !== '') {
                tidakHadirDisplay = r.staffTidakHadir;
            }

            const isLengkapDisemak = Boolean(r.signSemak && r.signSah);

            return (
              <div className="max-w-4xl mx-auto mb-10">
                {/* Modal Tandatangan Pentadbir */}
                {signingRole && (
                    <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 print:hidden">
                        <SignaturePad 
                            title={signingRole === 'semak' ? 'Tandatangan Penyemak (Pen. Kanan)' : signingRole === 'sah' ? 'Tandatangan Pengesah (Guru Besar)' : 'Tandatangan Pelapor'}
                            defaultDate={signingRole === 'semak' ? r.tarikhDisemak : signingRole === 'sah' ? r.tarikhDisahkan : r.tarikhDisediakan}
                            onSave={handleSaveSignature}
                            onCancel={() => setSigningRole(null)}
                        />
                    </div>
                )}

                {/* Modal Maklum Balas Pentadbir */}
                {feedbackModalOpen && (
                    <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 print:hidden p-4">
                        <div className="bg-white p-6 rounded-lg shadow-xl w-full max-w-md">
                            <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-gray-800">
                                <MessageSquare size={20}/> Maklum Balas
                            </h3>
                            <textarea 
                                className="w-full border border-gray-300 rounded-md p-3 mb-4 h-28 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" 
                                placeholder="Taip maklum balas sekiranya ada..."
                                value={tempFeedback}
                                onChange={(e) => setTempFeedback(e.target.value)}
                            ></textarea>
                            <div className="flex justify-end gap-2">
                                <button onClick={() => setFeedbackModalOpen(false)} className="px-4 py-2 bg-gray-200 text-gray-700 font-medium rounded hover:bg-gray-300 transition">Batal / Tutup</button>
                                <button onClick={handleSaveFeedback} className="px-4 py-2 bg-indigo-600 text-white font-medium rounded hover:bg-indigo-700 transition">Simpan</button>
                            </div>
                        </div>
                    </div>
                )}

                <div className="mb-6 flex flex-wrap justify-between items-center gap-3 print:hidden bg-white p-4 rounded-lg shadow-sm">
                  <div className="flex gap-2">
                    <button 
                      onClick={() => setActiveTab('list')}
                      className="flex items-center gap-2 text-gray-600 hover:text-gray-900 transition font-medium"
                    >
                      <ArrowLeft size={18} /> Kembali
                    </button>
                  </div>
                  <div className="flex flex-wrap gap-2">
                    {/* Butang Maklum Balas */}
                    <button 
                      onClick={() => { setTempFeedback(r.maklumBalas || ''); setFeedbackModalOpen(true); }} 
                      className="bg-indigo-100 text-indigo-700 px-3 py-2 rounded-md shadow-sm hover:bg-indigo-200 transition flex items-center gap-2 font-medium text-sm"
                    >
                      <MessageSquare size={16} /> Maklum Balas
                    </button>

                    {/* Butang e-Sign */}
                    <button onClick={() => setSigningRole('disediakan')} className="bg-blue-100 text-blue-700 px-3 py-2 rounded-md shadow-sm hover:bg-blue-200 transition flex items-center gap-2 font-medium text-sm">
                        <PenTool size={16} /> {r.signDisediakan ? 'Edit Sign Pelapor' : 'E-Sign Pelapor'}
                    </button>

                    <button onClick={() => setSigningRole('semak')} className="bg-purple-100 text-purple-700 px-3 py-2 rounded-md shadow-sm hover:bg-purple-200 transition flex items-center gap-2 font-medium text-sm">
                        <PenTool size={16} /> {r.signSemak ? 'Edit Sign Penyemak' : 'E-Sign Penyemak'}
                    </button>

                    <button onClick={() => setSigningRole('sah')} className="bg-pink-100 text-pink-700 px-3 py-2 rounded-md shadow-sm hover:bg-pink-200 transition flex items-center gap-2 font-medium text-sm">
                        <PenTool size={16} /> {r.signSah ? 'Edit Sign Pengesah' : 'E-Sign Pengesah'}
                    </button>

                    <button 
                      onClick={() => handleEdit(r)}
                      className="bg-yellow-500 text-white px-4 py-2 rounded-md shadow hover:bg-yellow-600 transition flex items-center gap-2 font-medium text-sm"
                    >
                      <Pencil size={18} /> Kemaskini
                    </button>

                    {/* Logik Butang Cetak */}
                    {isLengkapDisemak ? (
                        <button 
                          onClick={() => window.print()}
                          className="bg-green-600 text-white px-4 py-2 rounded-md shadow hover:bg-green-700 transition flex items-center gap-2 font-medium text-sm"
                          title="Cetak PDF"
                        >
                          <Printer size={18} /> Cetak PDF
                        </button>
                    ) : (
                        <button 
                          onClick={() => alert('Maaf, hanya OPR yang telah lengkap disemak dan disahkan boleh dicetak.')}
                          className="bg-gray-300 text-gray-500 px-4 py-2 rounded-md shadow cursor-not-allowed flex items-center gap-2 font-medium text-sm"
                          title="Tandatangan Penyemak dan Pengesah diperlukan untuk mencetak"
                        >
                          <Printer size={18} /> Cetak PDF
                        </button>
                    )}
                  </div>
                </div>

                <div className="bg-white p-8 md:p-12 shadow-lg print:shadow-none print:p-0 w-full min-h-[1056px] text-black relative" style={{ fontFamily: 'Arial, sans-serif' }}>
                  
                  <div className="flex items-center justify-between mb-4">
                    <div className="w-20 h-20 flex items-center justify-center overflow-hidden">
                      <img 
                        src="logo.png" 
                        alt="Logo SKPK Miri" 
                        onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} 
                        className="w-full h-full object-contain" 
                      />
                      <div className="w-full h-full border-2 border-black hidden flex-col items-center justify-center text-center text-[10px] font-bold bg-gray-100">
                        LOGO<br/>SKPK MIRI
                      </div>
                    </div>
                    <div className="flex-1 text-center">
                      <h1 className="font-bold text-lg underline underline-offset-4 decoration-2">ONE PAGE REPORT</h1>
                      <h2 className="font-bold text-base mt-1">SK PENDIDIKAN KHAS MIRI</h2>
                    </div>
                    <div className="w-20 h-20"></div> 
                  </div>
                  
                  <table className="w-full border-collapse border-2 border-black text-xs text-left">
                    <tbody>
                      <tr>
                        <td className="border-2 border-black p-1.5 font-bold w-1/4 align-top">Program</td>
                        <td className="border-2 border-black p-1.5 align-top" colSpan="2">{r.program}</td>
                      </tr>
                      <tr>
                        <td className="border-2 border-black p-1.5 font-bold align-top">Unit / Panitia</td>
                        <td className="border-2 border-black p-1.5 align-top" colSpan="2">{r.panitia}</td>
                      </tr>
                      <tr>
                        <td className="border-2 border-black p-1.5 font-bold align-top">Tarikh</td>
                        <td className="border-2 border-black p-1.5 align-top" colSpan="2">{r.tarikh}</td>
                      </tr>
                      <tr>
                        <td className="border-2 border-black p-1.5 font-bold align-top">Masa</td>
                        <td className="border-2 border-black p-1.5 align-top" colSpan="2">{r.masa}</td>
                      </tr>
                      <tr>
                        <td className="border-2 border-black p-1.5 font-bold align-top">Tempat</td>
                        <td className="border-2 border-black p-1.5 align-top" colSpan="2">{r.tempat}</td>
                      </tr>

                      <tr>
                        <td className="border-2 border-black p-1.5 font-bold align-top h-auto">Huraian aktiviti</td>
                        <td className="border-2 border-black p-1.5 align-top" colSpan="2">
                          <p className="whitespace-pre-wrap leading-snug">{r.interprestasi}</p>
                        </td>
                      </tr>

                      <tr>
                        <td className="border-2 border-black p-1.5 font-bold align-top h-auto">Hasil aktiviti</td>
                        <td className="border-2 border-black p-1.5 align-top" colSpan="2">
                          <p className="whitespace-pre-wrap leading-snug">{r.hasil}</p>
                        </td>
                      </tr>

                      <tr>
                        <td className="border-2 border-black p-0 align-top" colSpan="3">
                          <div className="grid grid-cols-3 w-full text-[11px]">
                            <div className="p-1.5 border-r-2 border-black flex flex-col justify-between">
                              <span className="font-bold block mb-1">Disediakan oleh:</span>
                              <div className="h-10 flex items-end justify-start">
                                 {r.signDisediakan && <img src={r.signDisediakan} alt="Sign Pelapor" className="max-h-12 mix-blend-multiply" />}
                              </div>
                              <div className="grid grid-cols-[50px_5px_1fr] gap-0.5 mt-2">
                                <span className="font-bold">Nama</span><span>:</span><span className="uppercase">{r.disediakanOleh}</span>
                                <span className="font-bold">Jawatan</span><span>:</span><span>{r.jawatanDisediakan}</span>
                                <span className="font-bold">Tarikh</span><span>:</span><span>{r.tarikhDisediakan}</span>
                              </div>
                            </div>
                            <div className="p-1.5 border-r-2 border-black flex flex-col justify-between">
                              <span className="font-bold block mb-1">Disemak oleh:</span>
                              <div className="h-10 flex items-end justify-start">
                                 {r.signSemak && <img src={r.signSemak} alt="Sign Penolong Kanan" className="max-h-12 mix-blend-multiply" />}
                              </div>
                              <div className="grid grid-cols-[50px_5px_1fr] gap-0.5 mt-2">
                                <span className="font-bold">Nama</span><span>:</span><span className="uppercase">{r.disemakOleh}</span>
                                <span className="font-bold">Jawatan</span><span>:</span><span>{r.jawatanDisemak}</span>
                                <span className="font-bold">Tarikh</span><span>:</span><span>{r.tarikhDisemak}</span>
                              </div>
                            </div>
                            <div className="p-1.5 flex flex-col justify-between">
                              <span className="font-bold block mb-1">Disahkan oleh:</span>
                              <div className="h-10 flex items-end justify-start">
                                 {r.signSah && <img src={r.signSah} alt="Sign Guru Besar" className="max-h-12 mix-blend-multiply" />}
                              </div>
                              <div className="grid grid-cols-[50px_5px_1fr] gap-0.5 mt-2">
                                <span className="font-bold">Nama</span><span>:</span><span className="uppercase">{r.disahkanOleh}</span>
                                <span className="font-bold">Jawatan</span><span>:</span><span>{r.jawatanDisahkan}</span>
                                <span className="font-bold">Tarikh</span><span>:</span><span>{r.tarikhDisahkan}</span>
                              </div>
                            </div>
                          </div>
                        </td>
                      </tr>

                      <tr>
                        <td className="border-2 border-black p-1.5 font-bold align-top">Gambar</td>
                        <td className="border-2 border-black p-1.5 align-top text-center" colSpan="2">
                          {r.gambar && r.gambar.length > 0 ? (
                            <div className="grid grid-cols-3 gap-1">
                              {r.gambar.map((src, idx) => (
                                <div key={idx} className="aspect-[4/3] border border-gray-300 overflow-hidden flex items-center justify-center bg-gray-50">
                                  <img src={src} alt={`Gambar ${idx+1}`} className="w-full h-full object-cover" />
                                </div>
                              ))}
                            </div>
                          ) : (
                            <div className="py-8 flex items-center justify-center text-gray-400 italic">
                              Tiada gambar disertakan
                            </div>
                          )}
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>

                {/* Lampiran Kehadiran (Muka Surat 2) */}
                <div className="bg-white p-8 md:p-12 shadow-lg print:shadow-none print:p-8 w-full min-h-[1056px] text-black relative mt-8 print:mt-0 print:break-before-page" style={{ fontFamily: 'Arial, sans-serif' }}>
                  <h2 className="text-center font-bold text-lg mb-8 underline">LAMPIRAN: SENARAI KEHADIRAN</h2>
                  
                  <div className="mb-6">
                    <div className="grid grid-cols-[100px_10px_1fr] gap-1 mb-2 text-sm md:text-base">
                      <span className="font-bold">Program</span><span>:</span><span className="uppercase">{r.program}</span>
                      <span className="font-bold">Tarikh</span><span>:</span><span>{r.tarikh}</span>
                      <span className="font-bold">Penyelaras</span><span>:</span><span className="uppercase">{r.penyelaras}</span>
                    </div>
                  </div>

                  <div className="border-2 border-black p-6 min-h-[500px]">
                    <h3 className="font-bold mb-4 border-b-2 border-gray-300 pb-2 text-lg">Senarai Hadir:</h3>
                    <div className="whitespace-pre-wrap leading-relaxed pl-2 text-sm md:text-base font-medium">
                      {displayHadir}
                    </div>

                    {tidakHadirDisplay && (
                        <div className="mt-8 border-t-2 border-gray-300 pt-6">
                            <h3 className="font-bold mb-4 text-lg text-red-700">Senarai Tidak Hadir:</h3>
                            <div className="whitespace-pre-wrap leading-relaxed pl-2 text-sm md:text-base font-medium text-gray-800">
                              {tidakHadirDisplay}
                            </div>
                        </div>
                    )}
                  </div>
                </div>
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-gray-100 text-gray-900 font-sans">
              <nav className="bg-blue-800 text-white p-4 shadow-md sticky top-0 z-10 print:hidden">
                <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                  <div className="font-bold text-xl flex items-center gap-2">
                    <FileText size={24} />
                    Sistem eOPR SKPK Miri
                  </div>
                  <div className="flex gap-2">
                    <button 
                      onClick={() => {
                        setFormData(initialForm); 
                        setActiveTab('form');
                      }}
                      className={`px-4 py-2 rounded-md font-medium flex items-center gap-2 transition ${activeTab === 'form' && !formData.id ? 'bg-blue-600 shadow-inner' : 'hover:bg-blue-700'}`}
                    >
                      <PlusCircle size={18} /> Borang Baru
                    </button>
                    <button 
                      onClick={() => setActiveTab('list')}
                      className={`px-4 py-2 rounded-md font-medium flex items-center gap-2 transition ${activeTab === 'list' ? 'bg-blue-600 shadow-inner' : 'hover:bg-blue-700'}`}
                    >
                      <List size={18} /> Senarai Rekod
                    </button>
                  </div>
                </div>
              </nav>

              <main className="p-4 md:p-8">
                {activeTab === 'form' && renderForm()}
                {activeTab === 'list' && renderList()}
                {activeTab === 'preview' && renderPreview()}
              </main>
              
              <footer className="text-center py-6 text-gray-500 text-sm print:hidden mt-auto">
                &copy; {new Date().getFullYear()} e-OPR | SKPK Miri
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
